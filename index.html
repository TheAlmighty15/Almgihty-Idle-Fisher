<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Almighty Idle Fisher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Nunito:wght@400;600;700;800&display=swap');

  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --brown-dark:   #2c1a0e;
    --brown-mid:    #5c3317;
    --brown-light:  #8b5e2f;
    --brown-border: #a0702a;
    --parchment:    #f5e6c8;
    --parchment2:   #ede0b8;
    --gold:         #f5c842;
    --gold-dark:    #c49a1a;
    --green-btn:    #3a7d1e;
    --green-btn2:   #2d6016;
    --green-light:  #5aad2e;
    --red:          #c0392b;
    --red-light:    #e74c3c;
    --text-dark:    #1a0e05;
    --text-mid:     #3d2008;
    --text-light:   #7a5030;
    --xp-fill:      #4caf50;
    --xp-bg:        #1a3a10;
    --shadow:       rgba(0,0,0,0.45);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a0e05;
    font-family: 'Nunito', sans-serif;
    color: var(--text-dark);
  }

  /* ── SCREENS ── */
  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .screen.active { display: flex; }

  /* ══════════════════════════════
     MAIN GAME SCREEN
  ══════════════════════════════ */
  #screen-main {
    background: #1a0e05;
  }

  /* TOP BAR */
  #top-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px 6px;
    background: linear-gradient(180deg, #1a0e05 0%, #2c1a0e 100%);
    border-bottom: 2px solid var(--brown-border);
    flex-shrink: 0;
    z-index: 10;
  }

  #level-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #1a3a6e 0%, #0d2248 100%);
    border: 3px solid var(--gold);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    flex-shrink: 0;
  }
  #level-badge .lbl { font-size: 9px; font-weight: 800; color: var(--gold); letter-spacing: 1px; line-height: 1; }
  #level-badge .num { font-size: 18px; font-weight: 800; color: white; line-height: 1; }

  #xp-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  #xp-label { font-size: 11px; font-weight: 700; color: var(--gold); display: flex; justify-content: space-between; }
  #xp-bar-bg {
    height: 14px;
    background: var(--xp-bg);
    border-radius: 7px;
    border: 1.5px solid #2a5a18;
    overflow: hidden;
  }
  #xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #2d8a10 0%, var(--xp-fill) 100%);
    border-radius: 7px;
    transition: width 0.4s ease;
    position: relative;
  }
  #xp-bar-fill::after {
    content: '';
    position: absolute;
    top: 2px; left: 4px; right: 4px;
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 3px;
  }

  #gold-display {
    display: flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, #3a2008 0%, #2c1a08 100%);
    border: 2px solid var(--gold-dark);
    border-radius: 20px;
    padding: 5px 12px;
    flex-shrink: 0;
  }
  #gold-display .coin-icon { font-size: 18px; }
  #gold-amount { font-size: 15px; font-weight: 800; color: var(--gold); }

  /* LEVEL UP FLASH */
  #levelup-flash {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
  }
  #levelup-flash .flash-text {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 52px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(245,200,66,0.9), 0 2px 8px rgba(0,0,0,0.8);
  }

  /* LOCATION SIGN */
  #location-sign {
    flex-shrink: 0;
    margin: 10px 16px 0;
    background: linear-gradient(180deg, #3d2008 0%, #2c1608 100%);
    border: 3px solid var(--brown-border);
    border-radius: 8px;
    padding: 8px 14px 10px;
    text-align: center;
    position: relative;
    box-shadow: 0 4px 12px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  #location-sign::before, #location-sign::after {
    content: '🍂';
    position: absolute;
    top: 4px;
    font-size: 18px;
  }
  #location-sign::before { left: 8px; }
  #location-sign::after  { right: 8px; }
  #location-name {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 18px;
    color: var(--gold);
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    letter-spacing: 1px;
  }
  #location-desc {
    font-size: 12px;
    color: #c8a878;
    margin-top: 3px;
  }

  /* SCENE */
  #scene {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
    margin: 8px 16px;
    border-radius: 10px;
    border: 3px solid var(--brown-border);
    box-shadow: 0 4px 20px var(--shadow);
    background: linear-gradient(180deg,
      #87CEEB 0%, #a8d8f0 35%,
      #5a9e3a 55%, #4a8a2a 58%,
      #3a6a1e 60%, #2a5010 62%,
      #6b8a4e 62%, #8aaa6e 65%,
      #4a7a5a 68%, #3d6b7a 72%,
      #2a5a6a 80%, #1a3a5a 100%
    );
  }

  /* Clouds */
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.9);
    border-radius: 50px;
    animation: driftCloud linear infinite;
  }
  .cloud::before, .cloud::after { content:''; position:absolute; background:rgba(255,255,255,0.9); border-radius:50%; }
  .cl1 { width:70px;height:22px;top:8%;left:-80px;animation-duration:50s;animation-delay:-10s; }
  .cl1::before{width:36px;height:36px;top:-16px;left:10px;}
  .cl1::after{width:26px;height:26px;top:-10px;left:34px;}
  .cl2 { width:50px;height:16px;top:14%;left:-60px;animation-duration:70s;animation-delay:-40s; }
  .cl2::before{width:28px;height:28px;top:-12px;left:8px;}
  .cl2::after{width:20px;height:20px;top:-8px;left:26px;}
  @keyframes driftCloud { from{transform:translateX(0)} to{transform:translateX(calc(100vw + 200px))} }

  /* Rod in scene */
  #scene-rod {
    position: absolute;
    bottom: 32%;
    left: 12%;
    width: 10px;
    height: 120px;
    background: linear-gradient(180deg, #c4956a 0%, #8B6040 100%);
    border-radius: 5px 5px 2px 2px;
    transform: rotate(-15deg);
    transform-origin: bottom center;
  }
  #scene-line {
    position: absolute;
    top: 4px; right: 2px;
    width: 1px;
    background: rgba(220,220,220,0.7);
    height: 140px;
    transform-origin: top right;
    transform: rotate(25deg);
  }
  #scene-bobber {
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e03030 50%, #f5f5f5 50%);
    border: 1.5px solid rgba(0,0,0,0.3);
    bottom: 30%;
    left: 46%;
    animation: bobberBob 2s ease-in-out infinite;
  }
  @keyframes bobberBob {
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(4px)}
  }
  #scene-bobber.casting {
    animation: none;
  }

  /* Casting ripple */
  .ripple-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    pointer-events: none;
    animation: rippleExpand 1.5s ease-out infinite;
    left: 46%; bottom: 30%;
    transform: translate(-50%, 50%);
  }
  .ripple-ring:nth-child(2) { animation-delay: 0.5s; }
  .ripple-ring:nth-child(3) { animation-delay: 1s; }
  @keyframes rippleExpand {
    from { width:14px;height:6px;opacity:0.7; }
    to   { width:60px;height:20px;opacity:0; }
  }

  /* Catch popup in scene */
  #catch-popup {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(20,10,0,0.88);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 8px 18px;
    color: var(--gold);
    font-size: 14px;
    font-weight: 800;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 5;
  }
  #catch-popup.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* DOCK AREA */
  #dock-area {
    flex-shrink: 0;
    background: linear-gradient(180deg, #4a3010 0%, #3a2008 100%);
    border-top: 3px solid var(--brown-border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Bait card */
  .dock-card {
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment2) 100%);
    border: 2.5px solid var(--brown-border);
    border-radius: 10px;
    padding: 6px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    min-width: 72px;
    box-shadow: 0 3px 8px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.4);
    user-select: none;
  }
  .dock-card:active { transform: scale(0.95); }
  .dock-card .card-title { font-size: 10px; font-weight: 800; color: var(--text-mid); letter-spacing: 0.5px; margin-bottom: 3px; text-transform: uppercase; }
  .dock-card .card-icon  { font-size: 26px; line-height: 1.1; }
  .dock-card .card-count { font-size: 11px; font-weight: 800; color: var(--brown-mid); margin-top: 2px; }

  /* GO FISH button */
  #btn-gofish {
    flex: 1;
    height: 70px;
    background: linear-gradient(180deg, var(--green-light) 0%, var(--green-btn) 40%, var(--green-btn2) 100%);
    border: 3px solid #1a4a08;
    border-radius: 14px;
    box-shadow: 0 6px 0 #0d2a04, 0 8px 16px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.2);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  #btn-gofish:active:not(:disabled), #btn-gofish.pressed {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #0d2a04, 0 4px 8px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  #btn-gofish:disabled, #btn-gofish.disabled {
    background: linear-gradient(180deg, #555 0%, #333 100%);
    border-color: #222;
    box-shadow: 0 3px 0 #111, 0 4px 8px var(--shadow);
    cursor: not-allowed;
  }
  #btn-gofish .btn-main-text {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 20px;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    line-height: 1;
  }
  #btn-gofish .btn-sub-text {
    font-size: 20px;
    margin-top: 2px;
    opacity: 0.8;
  }
  /* Progress bar inside go fish button */
  #gofish-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 5px;
    background: rgba(255,255,255,0.6);
    border-radius: 0 0 11px 11px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Autofisher card */
  #card-autofisher {
    min-width: 80px;
  }
  #autofisher-toggle {
    margin-top: 4px;
    background: #333;
    border: 1.5px solid #555;
    border-radius: 10px;
    padding: 3px 10px;
    font-size: 10px;
    font-weight: 800;
    color: #888;
    letter-spacing: 1px;
  }
  #autofisher-toggle.on {
    background: #1a5a10;
    border-color: #2d8a1e;
    color: #5adf3a;
  }

  /* BOTTOM NAV */
  #bottom-nav {
    flex-shrink: 0;
    display: flex;
    background: linear-gradient(180deg, #2c1a0e 0%, #1a0e05 100%);
    border-top: 2px solid var(--brown-border);
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 4px 10px;
    cursor: pointer;
    background: linear-gradient(180deg, var(--parchment2) 0%, var(--parchment) 100%);
    border: 1.5px solid var(--brown-border);
    border-radius: 0;
    transition: filter 0.15s;
    user-select: none;
    position: relative;
  }
  .nav-btn:first-child { border-radius: 0 0 0 0; }
  .nav-btn:active { filter: brightness(0.85); }
  .nav-btn .nav-icon { font-size: 28px; line-height: 1; }
  .nav-btn .nav-label { font-size: 10px; font-weight: 800; color: var(--text-mid); letter-spacing: 0.5px; margin-top: 3px; text-transform: uppercase; }
  /* Red flash outline for inventory full */
  .nav-btn.inv-alert { animation: invFlash 0.6s ease-in-out infinite; }
  @keyframes invFlash {
    0%,100% { box-shadow: none; }
    50% { box-shadow: inset 0 0 0 3px var(--red-light), 0 0 12px var(--red); }
  }

  /* ══════════════════════════════
     BAIT OVERLAY
  ══════════════════════════════ */
  #screen-bait {
    background: rgba(20,10,0,0.92);
    z-index: 50;
    justify-content: flex-end;
  }
  #bait-panel {
    background: linear-gradient(180deg, #3d2008 0%, #2c1608 100%);
    border-top: 3px solid var(--brown-border);
    border-radius: 20px 20px 0 0;
    padding: 16px;
    max-height: 70vh;
    overflow-y: auto;
  }
  #bait-panel h2 {
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold);
    font-size: 18px;
    text-align: center;
    margin-bottom: 14px;
  }
  .bait-slots {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bait-slot {
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment2) 100%);
    border: 2px solid var(--brown-border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .bait-slot.selected { border-color: var(--gold); box-shadow: 0 0 10px rgba(245,200,66,0.4); }
  .bait-slot.empty { opacity: 0.4; cursor: default; }
  .bait-slot .bs-icon { font-size: 32px; }
  .bait-slot .bs-info { flex: 1; }
  .bait-slot .bs-name { font-weight: 800; font-size: 15px; }
  .bait-slot .bs-count { font-size: 12px; color: var(--text-light); }
  .bait-slot .bs-selected { font-size: 20px; }
  #bait-close {
    margin-top: 14px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(180deg, var(--brown-light) 0%, var(--brown-mid) 100%);
    border: 2px solid var(--brown-border);
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--parchment);
    cursor: pointer;
  }

  /* ══════════════════════════════
     INVENTORY SCREEN
  ══════════════════════════════ */
  #screen-inventory {
    background: linear-gradient(180deg, #2c1a0e 0%, #1a0e05 100%);
  }
  .sub-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 2px solid var(--brown-border);
    background: linear-gradient(180deg, #3d2008 0%, #2c1608 100%);
    flex-shrink: 0;
  }
  .sub-header h2 {
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold);
    font-size: 18px;
  }
  .close-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    border: 2px solid var(--brown-border);
    color: var(--parchment);
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  #inventory-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 16px;
    overflow-y: auto;
    flex: 1;
  }
  .inv-slot {
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment2) 100%);
    border: 2.5px solid var(--brown-border);
    border-radius: 12px;
    padding: 12px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 3px 8px var(--shadow);
    position: relative;
  }
  .inv-slot.empty-slot {
    opacity: 0.35;
    border-style: dashed;
  }
  .inv-slot .slot-icon { font-size: 32px; }
  .inv-slot .slot-name { font-size: 12px; font-weight: 800; color: var(--text-mid); margin-top: 4px; text-align: center; }
  .inv-slot .slot-stack {
    position: absolute;
    top: 6px; right: 8px;
    background: var(--brown-mid);
    color: var(--gold);
    font-size: 11px;
    font-weight: 800;
    border-radius: 8px;
    padding: 1px 6px;
  }
  .inv-slot .slot-value {
    font-size: 10px;
    color: var(--text-light);
    margin-top: 2px;
  }

  #inv-summary {
    padding: 0 16px 12px;
    font-size: 13px;
    font-weight: 700;
    color: #c8a878;
    text-align: center;
    flex-shrink: 0;
  }

  /* ══════════════════════════════
     TACKLE SHOP SCREEN
  ══════════════════════════════ */
  #screen-tackle {
    background: #fff;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #screen-tackle .close-btn {
    position: absolute;
    top: 16px; right: 16px;
    border-color: #ccc;
    color: #333;
    background: #eee;
  }
  .shop-btn {
    width: 200px;
    padding: 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    border-radius: 12px;
    border: 3px solid;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 5px 0;
  }
  .shop-btn:active { transform: translateY(3px); box-shadow: 0 2px 0; }
  #btn-sellall {
    background: linear-gradient(180deg, #5aad2e 0%, #3a7d1e 100%);
    border-color: #1a4a08;
    color: white;
    box-shadow: 0 5px 0 #0d2a04;
  }
  #btn-sellall:active { box-shadow: 0 2px 0 #0d2a04; }
  #btn-market {
    background: linear-gradient(180deg, #f5c842 0%, #c49a1a 100%);
    border-color: #8a6a08;
    color: var(--brown-dark);
    box-shadow: 0 5px 0 #7a5a04;
  }
  #btn-market:active { box-shadow: 0 2px 0 #7a5a04; }
  #sell-result {
    font-size: 15px;
    font-weight: 700;
    color: var(--green-btn);
    min-height: 24px;
    text-align: center;
  }

  /* ══════════════════════════════
     MARKET / RODS / REELS SCREENS
  ══════════════════════════════ */
  #screen-market, #screen-rods, #screen-reels {
    background: linear-gradient(180deg, #2c1a0e 0%, #1a0e05 100%);
  }
  #market-list, #rods-list, #reels-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
    overflow-y: auto;
    flex: 1;
  }
  .shop-item {
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment2) 100%);
    border: 2.5px solid var(--brown-border);
    border-radius: 12px;
    padding: 14px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 3px 8px var(--shadow);
  }
  .shop-item-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .shop-item-icon { font-size: 30px; }
  .shop-item-info { flex: 1; }
  .shop-item-name { font-weight: 800; font-size: 15px; color: var(--text-mid); }
  .shop-item-desc { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .shop-item-count { font-size: 13px; font-weight: 700; color: var(--brown-mid); white-space: nowrap; }
  .shop-item-buybar {
    display: flex;
    gap: 8px;
  }
  .buy-btn {
    flex: 1;
    padding: 10px 4px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    border-radius: 8px;
    border: 2px solid #1a4a08;
    background: linear-gradient(180deg, var(--green-light) 0%, var(--green-btn) 100%);
    color: white;
    cursor: pointer;
    box-shadow: 0 3px 0 #0d2a04;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .buy-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #0d2a04; }
  .buy-btn:disabled {
    background: linear-gradient(180deg, #888 0%, #666 100%);

<script>
// ════════════════════════════════════════
//  FISH DEFINITIONS
//  Each fish carries its own data. catchWeightByBait = odds depending on
//  which bait is active (different baits favor different fish slightly).
// ════════════════════════════════════════
const FISH = {
  minnow: {
    id: 'minnow',
    name: 'Minnow',
    icon: '🐟',
    xp: 1,
    value: 1,           // $ per fish — edit this to rebalance
    catchWeightByBait: { corn: 50, worm: 25 },
  },
  bluegill: {
    id: 'bluegill',
    name: 'Bluegill',
    icon: '🐠',
    xp: 2,
    value: 1,
    catchWeightByBait: { corn: 25, worm: 25 },
  },
  crappie: {
    id: 'crappie',
    name: 'Crappie',
    icon: '🐡',
    xp: 3,
    value: 2,
    catchWeightByBait: { corn: 15, worm: 25 },
  },
  bass: {
    id: 'bass',
    name: 'Bass',
    icon: '🐋', // placeholder icon — swap if you'd like something more bass-like
    xp: 5,
    value: 4,
    catchWeightByBait: { corn: 7, worm: 15 },
  },
  catfish: {
    id: 'catfish',
    name: 'Catfish',
    icon: '🐟',
    xp: 8,
    value: 7,
    catchWeightByBait: { corn: 3, worm: 10 },
  },
};

// Build weighted pool based on the currently active bait. Rebuilt whenever
// the active bait changes.
let FISH_POOL = [];
function buildFishPool() {
  FISH_POOL = [];
  const baitId = state.activeBait;
  Object.values(FISH).forEach(f => {
    const w = (f.catchWeightByBait && f.catchWeightByBait[baitId] != null)
      ? f.catchWeightByBait[baitId]
      : f.catchWeightByBait.corn; // fallback
    for (let i = 0; i < w; i++) FISH_POOL.push(f.id);
  });
}

// ════════════════════════════════════════
//  BAIT DEFINITIONS
//  Corn = free starter bait (still has a count, costs $0 to buy).
//  Worm = $5 each, unlocked from level 1.
// ════════════════════════════════════════
const BAITS = {
  corn: {
    id: 'corn',
    name: 'Corn',
    icon: '🌽',
    cost: 0,
    unlockLevel: 0,
    description: 'Free starter bait.',
  },
  worm: {
    id: 'worm',
    name: 'Worm',
    icon: '🪱',
    cost: 5,
    unlockLevel: 1,
    description: 'A classic. $5 each.',
  },
};

// ════════════════════════════════════════
//  ROD / REEL DEFINITIONS
// ════════════════════════════════════════
const ROD_LEVEL2_COST  = 100;
const REEL_LEVEL2_COST = 150;
const ROD2_DOUBLE_CATCH_CHANCE = 0.10; // 10% chance to catch 2 fish using 1 bait at Rod Lv2
const CAST_DURATION_BASE = 3000; // ms, Reel Lv1
const CAST_DURATION_REEL2 = 2500; // ms, Reel Lv2 (0.5s faster)
const BAIT_MAX = 100; // max held of any single bait
const AUTOFISHER_UNLOCK_LEVEL = 5;
const AUTOFISHER_COST = 100;
const AUTOFISHER_TICK_MS = 6000; // fixed regardless of reel level

// ════════════════════════════════════════
//  XP / LEVEL CONFIG
// ════════════════════════════════════════
const MAX_LEVEL = 5;
function xpForLevel(lvl) {
  // Level 1->2: 10 XP, each next 50% more
  let req = 10;
  for (let i = 1; i < lvl; i++) req = Math.round(req * 1.5);
  return req;
}

// ════════════════════════════════════════
//  INVENTORY CONFIG
// ════════════════════════════════════════
const INV_SLOTS    = 10;
const STACK_LIMIT  = 5;

// ════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════
let state = defaultState();

function defaultState() {
  return {
    gold: 0,
    xp: 0,
    level: 0,
    rodLevel: 1,
    reelLevel: 1,
    autofisherOwned: false,
    autofisherOn: false,
    // inventory: array of {fishId, count} or null per slot
    inventory: Array(INV_SLOTS).fill(null),
    // bait inventory: { baitId: count }
    baitInventory: { corn: 10 },
    activeBait: 'corn',
  };
}

// ════════════════════════════════════════
//  SAVE / LOAD
// ════════════════════════════════════════
const SAVE_KEY = 'almightyIdleFisher_v1';

function saveGame() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      // Merge carefully so new fields from updates don't break old saves
      state = Object.assign(defaultState(), saved);
      // Ensure inventory array length
      while (state.inventory.length < INV_SLOTS) state.inventory.push(null);
      state.inventory = state.inventory.slice(0, INV_SLOTS);

      // Sanitize bait inventory: clamp negatives/old -1 "infinite" values to 0,
      // drop unknown bait ids, and give starting Corn if it's missing entirely
      // (e.g. an old save from before Corn existed).
      const defaults = defaultState().baitInventory;
      const cleanBaitInv = {};
      Object.keys(BAITS).forEach(id => {
        const raw = state.baitInventory[id];
        if (typeof raw === 'number' && raw >= 0) {
          cleanBaitInv[id] = Math.min(raw, BAIT_MAX);
        } else if (!(id in (saved.baitInventory || {}))) {
          // key never existed in the old save — give the normal starting amount
          cleanBaitInv[id] = defaults[id] || 0;
        } else {
          // key existed but was invalid (e.g. old -1 infinite marker)
          cleanBaitInv[id] = 0;
        }
      });
      state.baitInventory = cleanBaitInv;

      // If active bait no longer exists or has zero count, fall back to corn
      if (!BAITS[state.activeBait]) state.activeBait = 'corn';
    }
  } catch(e) {}
  buildFishPool();

  // Resume autofisher if it was left on and conditions still allow it.
  if (state.autofisherOwned && state.autofisherOn) {
    if ((state.baitInventory[state.activeBait] || 0) <= 0 || isInventoryFull()) {
      state.autofisherOn = false;
    } else {
      startAutofisher();
    }
  }
}

function resetGame() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  localStorage.removeItem(SAVE_KEY);
  state = defaultState();
  buildFishPool();
  isCasting = false;
  clearInterval(castInterval);
  stopAutofisher();
  document.getElementById('gofish-progress').style.width = '0%';
  updateAllUI();
  showScreen('main');
}

// ════════════════════════════════════════
//  SCREEN NAVIGATION
// ════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + name);
  if (el) el.classList.add('active');

  if (name === 'inventory') renderInventoryScreen();
  if (name === 'bait')      renderBaitScreen();
  if (name === 'market')    renderMarketScreen();
  if (name === 'rods')      renderRodsScreen();
  if (name === 'reels')     renderReelsScreen();
  if (name === 'main')      updateAllUI();
}

function openBait() { showScreen('bait'); }
function closeBait(e) {
  if (e.target === document.getElementById('screen-bait')) showScreen('main');
}

// ════════════════════════════════════════
//  FISHING LOGIC
// ════════════════════════════════════════
function getCastDuration() {
  return state.reelLevel >= 2 ? CAST_DURATION_REEL2 : CAST_DURATION_BASE;
}
let isCasting = false;
let castInterval = null;
let castStart = 0;

function goFish() {
  if (isCasting) return;
  if (isInventoryFull()) return;
  if ((state.baitInventory[state.activeBait] || 0) <= 0) return;

  isCasting = true;
  castStart = Date.now();
  const castDuration = getCastDuration();

  // Consume one bait
  state.baitInventory[state.activeBait]--;

  const btn = document.getElementById('btn-gofish');
  btn.classList.add('pressed');
  document.getElementById('gofish-text').textContent = 'FISHING...';

  // Bobber ripple
  document.getElementById('scene-bobber').classList.add('casting');
  addRipples();

  // Progress bar
  castInterval = setInterval(() => {
    const elapsed = Date.now() - castStart;
    const pct = Math.min(100, (elapsed / castDuration) * 100);
    document.getElementById('gofish-progress').style.width = pct + '%';

    if (elapsed >= castDuration) {
      clearInterval(castInterval);
      finishCast();
    }
  }, 50);
}

function finishCast() {
  const fish = rollFish();
  const caughtFish = [fish];

  // Rod Level 2: 10% chance to catch a 2nd fish using the same 1 bait.
  // Both rolls draw from the same weighted pool (duplicates are possible).
  if (state.rodLevel >= 2 && Math.random() < ROD2_DOUBLE_CATCH_CHANCE) {
    const bonusFish = rollFish();
    caughtFish.push(bonusFish);
  }

  const actuallyCaught = [];
  caughtFish.forEach(f => {
    if (addToInventory(f.id)) {
      grantXP(f.xp);
      actuallyCaught.push(f);
    }
  });

  if (actuallyCaught.length > 0) {
    showCatchPopup(actuallyCaught);
  }

  // Reset button
  isCasting = false;
  const btn = document.getElementById('btn-gofish');
  btn.classList.remove('pressed');
  document.getElementById('gofish-progress').style.width = '0%';
  document.getElementById('scene-bobber').classList.remove('casting');
  removeRipples();

  updateAllUI();
  saveGame();
}

function rollFish() {
  const idx = Math.floor(Math.random() * FISH_POOL.length);
  return FISH[FISH_POOL[idx]];
}

function showCatchPopup(fishList) {
  const el = document.getElementById('catch-popup');
  if (fishList.length === 1) {
    el.textContent = `${fishList[0].icon} ${fishList[0].name} caught!`;
  } else {
    const names = fishList.map(f => `${f.icon} ${f.name}`).join(' + ');
    el.textContent = `🎉 Double catch! ${names}`;
  }
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ════════════════════════════════════════
//  AUTOFISHER
//  Unlocks at level 5, one-time 100 gold purchase, then toggled on/off.
//  Ticks every 6000ms (fixed, NOT affected by Reel Level 2).
//  Each tick: consumes 1 of the active bait, rolls the fish pool (so bait
//  type still affects odds), and respects Rod Level 2's double-catch chance.
//  Turns itself OFF (not auto-resuming) if bait runs out or inventory is full.
// ════════════════════════════════════════
let autofisherInterval = null;

function performOneCatch() {
  // Shared by manual casting and the autofisher.
  // Returns true if at least one fish was actually added to inventory.
  const fish = rollFish();
  const caughtFish = [fish];

  if (state.rodLevel >= 2 && Math.random() < ROD2_DOUBLE_CATCH_CHANCE) {
    caughtFish.push(rollFish());
  }

  const actuallyCaught = [];
  caughtFish.forEach(f => {
    if (addToInventory(f.id)) {
      grantXP(f.xp);
      actuallyCaught.push(f);
    }
  });

  if (actuallyCaught.length > 0) {
    showCatchPopup(actuallyCaught);
  }
  return actuallyCaught.length > 0;
}

function startAutofisher() {
  if (autofisherInterval) return;
  autofisherInterval = setInterval(autofisherTick, AUTOFISHER_TICK_MS);
}

function stopAutofisher() {
  if (autofisherInterval) {
    clearInterval(autofisherInterval);
    autofisherInterval = null;
  }
}

function autofisherTick() {
  if (!state.autofisherOn) { stopAutofisher(); return; }

  // Stop conditions: out of bait, or inventory full. Requires manual restart.
  if ((state.baitInventory[state.activeBait] || 0) <= 0) {
    state.autofisherOn = false;
    stopAutofisher();
    updateAutofisherCard();
    saveGame();
    return;
  }
  if (isInventoryFull()) {
    state.autofisherOn = false;
    stopAutofisher();
    updateAutofisherCard();
    saveGame();
    return;
  }

  // Consume bait and attempt the catch, just like manual fishing.
  state.baitInventory[state.activeBait]--;
  performOneCatch();

  updateAllUI();
  saveGame();
}

function onAutofisherCardClick() {
  if (!state.autofisherOwned) {
    // Not yet purchased — try to buy it.
    if (state.level < AUTOFISHER_UNLOCK_LEVEL) {
      document.getElementById('catch-popup').textContent = `Autofisher unlocks at level ${AUTOFISHER_UNLOCK_LEVEL}`;
      document.getElementById('catch-popup').classList.add('show');
      setTimeout(() => document.getElementById('catch-popup').classList.remove('show'), 2000);
      return;
    }
    if (state.gold < AUTOFISHER_COST) {
      document.getElementById('catch-popup').textContent = `Need $${AUTOFISHER_COST} to buy the Autofisher`;
      document.getElementById('catch-popup').classList.add('show');
      setTimeout(() => document.getElementById('catch-popup').classList.remove('show'), 2000);
      return;
    }
    state.gold -= AUTOFISHER_COST;
    state.autofisherOwned = true;
    state.autofisherOn = true;
    startAutofisher();
    saveGame();
    updateAllUI();
    return;
  }

  // Already owned — toggle on/off.
  state.autofisherOn = !state.autofisherOn;
  if (state.autofisherOn) {
    // Don't allow turning on if there's no bait or inventory is full.
    if ((state.baitInventory[state.activeBait] || 0) <= 0 || isInventoryFull()) {
      state.autofisherOn = false;
    } else {
      startAutofisher();
    }
  } else {
    stopAutofisher();
  }
  saveGame();
  updateAllUI();
}

function updateAutofisherCard() {
  const card = document.getElementById('card-autofisher');
  const toggle = document.getElementById('autofisher-toggle');
  if (!state.autofisherOwned) {
    const locked = state.level < AUTOFISHER_UNLOCK_LEVEL;
    toggle.textContent = locked ? `LVL ${AUTOFISHER_UNLOCK_LEVEL}` : `BUY $${AUTOFISHER_COST}`;
    toggle.classList.remove('on');
    card.style.opacity = locked ? '0.6' : '1';
  } else {
    toggle.textContent = state.autofisherOn ? 'ON' : 'OFF';
    toggle.classList.toggle('on', state.autofisherOn);
    card.style.opacity = '1';
  }
}

// Ripple elements
function addRipples() {
  const scene = document.getElementById('scene');
  for (let i = 0; i < 3; i++) {
    const r = document.createElement('div');
    r.className = 'ripple-ring';
    r.id = 'ripple-' + i;
    scene.appendChild(r);
  }
}
function removeRipples() {
  document.querySelectorAll('.ripple-ring').forEach(r => r.remove());
}

// ════════════════════════════════════════
//  INVENTORY LOGIC
// ════════════════════════════════════════
function isInventoryFull() {
  // Full means: every slot is occupied AND no existing stack has room for any fish
  // We check: can we place ANY fish? For simplicity check if general space exists.
  const hasEmptySlot = state.inventory.some(s => s === null);
  const hasPartialStack = state.inventory.some(s => s !== null && s.count < STACK_LIMIT);
  return !hasEmptySlot && !hasPartialStack;
}

function addToInventory(fishId) {
  // 1. Find existing partial stack of same fish
  const existing = state.inventory.findIndex(s => s !== null && s.fishId === fishId && s.count < STACK_LIMIT);
  if (existing !== -1) {
    state.inventory[existing].count++;
    return true;
  }
  // 2. Find empty slot
  const empty = state.inventory.findIndex(s => s === null);
  if (empty !== -1) {
    state.inventory[empty] = { fishId, count: 1 };
    return true;
  }
  // 3. No room
  return false;
}

function clearInventory() {
  state.inventory = Array(INV_SLOTS).fill(null);
}

// ════════════════════════════════════════
//  SELL LOGIC
// ════════════════════════════════════════
function sellAll() {
  let totalGold = 0;
  let totalFish = 0;
  state.inventory.forEach(slot => {
    if (slot) {
      const fish = FISH[slot.fishId];
      totalGold += fish.value * slot.count; // value lives on the fish
      totalFish += slot.count;
    }
  });
  if (totalFish === 0) {
    document.getElementById('sell-result').textContent = 'Nothing to sell!';
    return;
  }
  clearInventory();
  state.gold += totalGold;
  saveGame();
  updateAllUI();
  document.getElementById('sell-result').textContent = `Sold ${totalFish} fish for $${totalGold}!`;
  setTimeout(() => { document.getElementById('sell-result').textContent = ''; }, 3000);
}

// ════════════════════════════════════════
//  XP & LEVELING
// ════════════════════════════════════════
function grantXP(amount) {
  if (state.level >= MAX_LEVEL) return;
  state.xp += amount;
  const needed = xpForLevel(state.level);
  if (state.xp >= needed) {
    state.xp -= needed;
    state.level++;
    flashLevelUp(state.level);
    if (state.level >= MAX_LEVEL) state.xp = 0; // cap at max
  }
}

function flashLevelUp(newLevel) {
  const flash = document.getElementById('levelup-flash');
  const num   = document.getElementById('flash-num');
  num.textContent = newLevel;

  let count = 0;
  flash.style.opacity = '1';
  const interval = setInterval(() => {
    count++;
    flash.style.opacity = flash.style.opacity === '0' ? '1' : '0';
    if (count >= 6) { // 3 flashes = 6 toggles
      clearInterval(interval);
      flash.style.opacity = '0';
    }
  }, 300);
}

// ════════════════════════════════════════
//  UI UPDATES
// ════════════════════════════════════════
function updateAllUI() {
  updateTopBar();
  updateGofishBtn();
  updateBaitCard();
  updateAutofisherCard();
}

function updateTopBar() {
  document.getElementById('level-num').textContent = state.level;
  document.getElementById('gold-amount').textContent = state.gold;

  const isMaxed = state.level >= MAX_LEVEL;
  const needed  = isMaxed ? xpForLevel(MAX_LEVEL - 1) : xpForLevel(state.level);
  const xpShow  = isMaxed ? needed : state.xp;
  const pct     = isMaxed ? 100 : Math.min(100, (state.xp / needed) * 100);

  document.getElementById('xp-text').textContent = isMaxed ? 'MAX LEVEL' : `${state.xp} / ${needed}`;
  document.getElementById('xp-bar-fill').style.width = pct + '%';
}

function updateGofishBtn() {
  const btn  = document.getElementById('btn-gofish');
  const text = document.getElementById('gofish-text');
  const navInv = document.getElementById('nav-inventory');

  if (isCasting) return; // don't override during cast

  const outOfBait = (state.baitInventory[state.activeBait] || 0) <= 0;

  if (isInventoryFull()) {
    btn.disabled = true;
    btn.classList.add('disabled');
    text.textContent = 'INVENTORY FULL';
    navInv.classList.add('inv-alert');
  } else if (outOfBait) {
    btn.disabled = true;
    btn.classList.add('disabled');
    text.textContent = 'OUT OF BAIT';
    navInv.classList.remove('inv-alert');
  } else {
    btn.disabled = false;
    btn.classList.remove('disabled');
    text.textContent = 'GO FISH!';
    navInv.classList.remove('inv-alert');
  }
}

function updateBaitCard() {
  const bait = BAITS[state.activeBait];
  if (!bait) return;
  document.getElementById('bait-icon').textContent  = bait.icon;
  const count = state.baitInventory[state.activeBait] || 0;
  document.getElementById('bait-count').textContent = count;
}

// ════════════════════════════════════════
//  INVENTORY SCREEN RENDER
// ════════════════════════════════════════
function renderInventoryScreen() {
  const grid = document.getElementById('inventory-grid');
  grid.innerHTML = '';

  let totalFish = 0;
  let totalValue = 0;

  state.inventory.forEach((slot, i) => {
    const div = document.createElement('div');
    if (slot) {
      const fish = FISH[slot.fishId];
      totalFish  += slot.count;
      totalValue += fish.value * slot.count;
      div.className = 'inv-slot';
      div.innerHTML = `
        <span class="slot-stack">${slot.count}/${STACK_LIMIT}</span>
        <span class="slot-icon">${fish.icon}</span>
        <span class="slot-name">${fish.name}</span>
        <span class="slot-value">$${fish.value} each</span>
      `;
    } else {
      div.className = 'inv-slot empty-slot';
      div.innerHTML = `<span class="slot-icon" style="font-size:22px;opacity:0.3">🪣</span>`;
    }
    grid.appendChild(div);
  });

  document.getElementById('inv-summary').textContent =
    totalFish > 0 ? `${totalFish} fish · Est. value $${totalValue}` : 'No fish yet — go cast a line!';
}

// ════════════════════════════════════════
//  MARKET SCREEN RENDER + PURCHASE
//  NOTE: Buy quantity is x10 only for now.
//  TODO LATER: add 10 / 25 / 50 / 100 buy-quantity buttons.
// ════════════════════════════════════════
function renderMarketScreen() {
  const list = document.getElementById('market-list');
  list.innerHTML = '';
  document.getElementById('market-result').textContent = '';

  Object.values(BAITS).forEach(bait => {
    const unlocked = state.level >= bait.unlockLevel;
    const count = state.baitInventory[bait.id] || 0;
    const div = document.createElement('div');
    div.className = 'shop-item';

    if (!unlocked) {
      div.innerHTML = `
        <div class="shop-item-top">
          <span class="shop-item-icon">🔒</span>
          <div class="shop-item-info">
            <div class="shop-item-name">${bait.name}</div>
            <div class="shop-item-desc">Unlocks at level ${bait.unlockLevel}</div>
          </div>
        </div>
      `;
    } else {
      const atCap = count >= BAIT_MAX;
      const costText = bait.cost === 0 ? 'Free' : `$${bait.cost} each`;
      div.innerHTML = `
        <div class="shop-item-top">
          <span class="shop-item-icon">${bait.icon}</span>
          <div class="shop-item-info">
            <div class="shop-item-name">${bait.name}</div>
            <div class="shop-item-desc">${costText}</div>
          </div>
          <div class="shop-item-count">x${count} / ${BAIT_MAX}</div>
        </div>
        <div class="shop-item-buybar">
          <button class="buy-btn" data-bait="${bait.id}" data-qty="10" ${atCap ? 'disabled' : ''}>Buy 10</button>
        </div>
      `;
    }
    list.appendChild(div);
  });

  list.querySelectorAll('.buy-btn').forEach(btn => {
    btn.onclick = () => buyBait(btn.dataset.bait, parseInt(btn.dataset.qty, 10));
  });
}

function buyBait(baitId, qty) {
  const bait = BAITS[baitId];
  if (!bait) return;
  const current = state.baitInventory[baitId] || 0;

  if (current + qty > BAIT_MAX) {
    document.getElementById('market-result').textContent = `Can't exceed ${BAIT_MAX} ${bait.name}!`;
    return;
  }
  const totalCost = bait.cost * qty;
  if (state.gold < totalCost) {
    document.getElementById('market-result').textContent = `Not enough gold! Need $${totalCost}.`;
    return;
  }

  state.gold -= totalCost;
  state.baitInventory[baitId] = current + qty;
  saveGame();
  updateAllUI();
  renderMarketScreen();
  document.getElementById('market-result').textContent = `Bought ${qty} ${bait.name}!`;
}

// ════════════════════════════════════════
//  RODS SCREEN RENDER + PURCHASE
// ════════════════════════════════════════
function renderRodsScreen() {
  const list = document.getElementById('rods-list');
  list.innerHTML = '';

  const div = document.createElement('div');
  div.className = 'shop-item';

  if (state.rodLevel >= 2) {
    div.innerHTML = `
      <div class="shop-item-top">
        <span class="shop-item-icon">🎣</span>
        <div class="shop-item-info">
          <div class="shop-item-name">Rod Level 2</div>
          <div class="shop-item-desc">10% chance to catch 2 fish using only 1 bait.</div>
        </div>
      </div>
      <div class="upgrade-owned">✅ Owned</div>
    `;
  } else {
    const canAfford = state.gold >= ROD_LEVEL2_COST;
    div.innerHTML = `
      <div class="shop-item-top">
        <span class="shop-item-icon">🎣</span>
        <div class="shop-item-info">
          <div class="shop-item-name">Rod Level 2</div>
          <div class="shop-item-desc">10% chance to catch 2 fish using only 1 bait.</div>
        </div>
      </div>
      <button class="upgrade-btn" id="buy-rod2" ${canAfford ? '' : 'disabled'}>Buy — $${ROD_LEVEL2_COST}</button>
    `;
    list.appendChild(div);
    document.getElementById('buy-rod2').onclick = buyRodLevel2;
    return;
  }
  list.appendChild(div);
}

function buyRodLevel2() {
  if (state.rodLevel >= 2) return;
  if (state.gold < ROD_LEVEL2_COST) return;
  state.gold -= ROD_LEVEL2_COST;
  state.rodLevel = 2;
  saveGame();
  updateAllUI();
  renderRodsScreen();
}

// ════════════════════════════════════════
//  BAIT SCREEN RENDER
// ════════════════════════════════════════
function renderBaitScreen() {
  const list = document.getElementById('bait-slots-list');
  list.innerHTML = '';

  const unlockedIds = Object.keys(BAITS).filter(id => state.level >= BAITS[id].unlockLevel);

  for (let i = 0; i < 5; i++) {
    const div = document.createElement('div');
    if (i < unlockedIds.length) {
      const id    = unlockedIds[i];
      const bait  = BAITS[id];
      const count = state.baitInventory[id] || 0;
      const isSelected = state.activeBait === id;
      const isEmpty = count <= 0;
      div.className = 'bait-slot' + (isSelected ? ' selected' : '') + (isEmpty ? ' empty' : '');
      div.innerHTML = `
        <span class="bs-icon">${bait.icon}</span>
        <div class="bs-info">
          <div class="bs-name">${bait.name}</div>
          <div class="bs-count">x${count}</div>
        </div>
        ${isSelected ? '<span class="bs-selected">✅</span>' : ''}
      `;
      if (!isEmpty) {
        div.onclick = () => { state.activeBait = id; buildFishPool(); saveGame(); renderBaitScreen(); updateBaitCard(); };
      } else {
        div.style.cursor = 'default';
      }
    } else {
      div.className = 'bait-slot empty';
      div.innerHTML = `<span class="bs-icon">—</span><div class="bs-info"><div class="bs-name">Locked</div></div>`;
    }
    list.appendChild(div);
  }
}
