<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Almighty Idle Fisher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Nunito:wght@400;600;700;800&display=swap');

  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --brown-dark:   #2c1a0e;
    --brown-mid:    #5c3317;
    --brown-light:  #8b5e2f;
    --brown-border: #a0702a;
    --parchment:    #f5e6c8;
    --parchment2:   #ede0b8;
    --gold:         #f5c842;
    --gold-dark:    #c49a1a;
    --green-btn:    #3a7d1e;
    --green-btn2:   #2d6016;
    --green-light:  #5aad2e;
    --red:          #c0392b;
    --red-light:    #e74c3c;
    --text-dark:    #1a0e05;
    --text-mid:     #3d2008;
    --text-light:   #7a5030;
    --xp-fill:      #4caf50;
    --xp-bg:        #1a3a10;
    --shadow:       rgba(0,0,0,0.45);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a0e05;
    font-family: 'Nunito', sans-serif;
    color: var(--text-dark);
  }

  /* ── SCREENS ── */
  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .screen.active { display: flex; }

  /* ══════════════════════════════
     MAIN GAME SCREEN
  ══════════════════════════════ */
  #screen-main {
    background: #1a0e05;
  }

  /* TOP BAR */
  #top-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px 6px;
    background: linear-gradient(180deg, #1a0e05 0%, #2c1a0e 100%);
    border-bottom: 2px solid var(--brown-border);
    flex-shrink: 0;
    z-index: 10;
  }

  #level-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #1a3a6e 0%, #0d2248 100%);
    border: 3px solid var(--gold);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    flex-shrink: 0;
  }
  #level-badge .lbl { font-size: 9px; font-weight: 800; color: var(--gold); letter-spacing: 1px; line-height: 1; }
  #level-badge .num { font-size: 18px; font-weight: 800; color: white; line-height: 1; }

  #xp-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  #xp-label { font-size: 11px; font-weight: 700; color: var(--gold); display: flex; justify-content: space-between; }
  #xp-bar-bg {
    height: 14px;
    background: var(--xp-bg);
    border-radius: 7px;
    border: 1.5px solid #2a5a18;
    overflow: hidden;
  }
  #xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #2d8a10 0%, var(--xp-fill) 100%);
    border-radius: 7px;
    transition: width 0.4s ease;
    position: relative;
  }
  #xp-bar-fill::after {
    content: '';
    position: absolute;
    top: 2px; left: 4px; right: 4px;
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 3px;
  }

  #gold-display {
    display: flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, #3a2008 0%, #2c1a08 100%);
    border: 2px solid var(--gold-dark);
    border-radius: 20px;
    padding: 5px 12px;
    flex-shrink: 0;
  }
  #gold-display .coin-icon { font-size: 18px; }
  #gold-amount { font-size: 15px; font-weight: 800; color: var(--gold); }

  /* LEVEL UP FLASH */
  #levelup-flash {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
  }
  #levelup-flash .flash-text {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 52px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(245,200,66,0.9), 0 2px 8px rgba(0,0,0,0.8);
  }

  /* LOCATION SIGN */
  #location-sign {
    flex-shrink: 0;
    margin: 10px 16px 0;
    background: linear-gradient(180deg, #3d2008 0%, #2c1608 100%);
    border: 3px solid var(--brown-border);
    border-radius: 8px;
    padding: 8px 14px 10px;
    text-align: center;
    position: relative;
    box-shadow: 0 4px 12px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  #location-sign::before, #location-sign::after {
    content: '🍂';
    position: absolute;
    top: 4px;
    font-size: 18px;
  }
  #location-sign::before { left: 8px; }
  #location-sign::after  { right: 8px; }
  #location-name {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 18px;
    color: var(--gold);
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    letter-spacing: 1px;
  }
  #location-desc {
    font-size: 12px;
    color: #c8a878;
    margin-top: 3px;
  }

  /* SCENE */
  #scene {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
    margin: 8px 16px;
    border-radius: 10px;
    border: 3px solid var(--brown-border);
    box-shadow: 0 4px 20px var(--shadow);
    background: url('pond.PNG') center center / cover no-repeat;
  }



  /* Rod in scene */
  #scene-rod {
    position: absolute;
    bottom: 32%;
    left: 12%;
    width: 10px;
    height: 120px;
    background: linear-gradient(180deg, #c4956a 0%, #8B6040 100%);
    border-radius: 5px 5px 2px 2px;
    transform: rotate(-15deg);
    transform-origin: bottom center;
  }
  #scene-line {
    position: absolute;
    top: 4px; right: 2px;
    width: 1px;
    background: rgba(220,220,220,0.7);
    height: 140px;
    transform-origin: top right;
    transform: rotate(25deg);
  }
  #scene-bobber {
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e03030 50%, #f5f5f5 50%);
    border: 1.5px solid rgba(0,0,0,0.3);
    bottom: 30%;
    left: 46%;
    animation: bobberBob 2s ease-in-out infinite;
  }
  @keyframes bobberBob {
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(4px)}
  }
  #scene-bobber.casting {
    animation: none;
  }

  /* Casting ripple */
  .ripple-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    pointer-events: none;
    animation: rippleExpand 1.5s ease-out infinite;
    left: 46%; bottom: 30%;
    transform: translate(-50%, 50%);
  }
  .ripple-ring:nth-child(2) { animation-delay: 0.5s; }
  .ripple-ring:nth-child(3) { animation-delay: 1s; }
  @keyframes rippleExpand {
    from { width:14px;height:6px;opacity:0.7; }
    to   { width:60px;height:20px;opacity:0; }
  }

  /* Catch popup in scene */
  #catch-popup {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(20,10,0,0.88);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 8px 18px;
    color: var(--gold);
    font-size: 14px;
    font-weight: 800;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 5;
  }
  #catch-popup.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* DOCK AREA */
  #dock-area {
    flex-shrink: 0;
    background: linear-gradient(180deg, #4a3010 0%, #3a2008 100%);
    border-top: 3px solid var(--brown-border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Bait card */
  .dock-card {
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment2) 100%);
    border: 2.5px solid var(--brown-border);
    border-radius: 10px;
    padding: 6px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    min-width: 72px;
    box-shadow: 0 3px 8px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.4);
    user-select: none;
  }
  .dock-card:active { transform: scale(0.95); }
  .dock-card .card-title { font-size: 10px; font-weight: 800; color: var(--text-mid); letter-spacing: 0.5px; margin-bottom: 3px; text-transform: uppercase; }
  .dock-card .card-icon  { font-size: 26px; line-height: 1.1; }
  .dock-card .card-count { font-size: 11px; font-weight: 800; color: var(--brown-mid); margin-top: 2px; }

  /* GO FISH button */
  #btn-gofish {
    flex: 1;
    height: 70px;
    background: linear-gradient(180deg, var(--green-light) 0%, var(--green-btn) 40%, var(--green-btn2) 100%);
    border: 3px solid #1a4a08;
    border-radius: 14px;
    box-shadow: 0 6px 0 #0d2a04, 0 8px 16px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.2);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  #btn-gofish:active:not(:disabled), #btn-gofish.pressed {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #0d2a04, 0 4px 8px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  #btn-gofish:disabled, #btn-gofish.disabled {
    background: linear-gradient(180deg, #555 0%, #333 100%);
    border-color: #222;
    box-shadow: 0 3px 0 #111, 0 4px 8px var(--shadow);
    cursor: not-allowed;
  }
  #btn-gofish .btn-main-text {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 20px;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    line-height: 1;
  }
  #btn-gofish .btn-sub-text {
    font-size: 20px;
    margin-top: 2px;
    opacity: 0.8;
  }
  /* Progress bar inside go fish button */
  #gofish-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 5px;
    background: rgba(255,255,255,0.6);
    border-radius: 0 0 11px 11px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Autofisher card */
  #card-autofisher {
    min-width: 80px;
  }
  #autofisher-toggle {
    margin-top: 4px;
    background: #333;
    border: 1.5px solid #555;
    border-radius: 10px;
    padding: 3px 10px;
    font-size: 10px;
    font-weight: 800;
    color: #888;
    letter-spacing: 1px;
  }
  #autofisher-toggle.on {
    background: #1a5a10;
    border-color: #2d8a1e;
    color: #5adf3a;
  }

  /* BOTTOM NAV */
  #bottom-nav {
    flex-shrink: 0;
    display: flex;
    background: linear-gradient(180deg, #2c1a0e 0%, #1a0e05 100%);
    border-top: 2px solid var(--brown-border);
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 4px 10px;
    cursor: pointer;
    background: linear-gradient(180deg, var(--parchment2) 0%, var(--parchment) 100%);
    border: 1.5px solid var(--brown-border);
    border-radius: 0;
    transition: filter 0.15s;
    user-select: none;
    position: relative;
  }
  .nav-btn:first-child { border-radius: 0 0 0 0; }
  .nav-btn:active { filter: brightness(0.85); }
  .nav-btn .nav-icon { font-size: 28px; line-height: 1; }
  .nav-btn .nav-label { font-size: 10px; font-weight: 800; color: var(--text-mid); letter-spacing: 0.5px; margin-top: 3px; text-transform: uppercase; }
  /* Red flash outline for inventory full */
  .nav-btn.inv-alert { animation: invFlash 0.6s ease-in-out infinite; }
  @keyframes invFlash {
    0%,100% { box-shadow: none; }
    50% { box-shadow: inset 0 0 0 3px var(--red-light), 0 0 12px var(--red); }
  }

  /* ══════════════════════════════
     BAIT OVERLAY
  ══════════════════════════════ */
  #screen-bait {
    background: rgba(20,10,0,0.92);
    z-index: 50;
    justify-content: flex-end;
  }
  #bait-panel {
    background: linear-gradient(180deg, #3d2008 0%, #2c1608 100%);
    border-top: 3px solid var(--brown-border);
    border-radius: 20px 20px 0 0;
    padding: 16px;
    max-height: 70vh;
    overflow-y: auto;
  }
  #bait-panel h2 {
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold);
    font-size: 18px;
    text-align: center;
    margin-bottom: 14px;
  }
  .bait-slots {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bait-slot {
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment2) 100%);
    border: 2px solid var(--brown-border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .bait-slot.selected { border-color: var(--gold); box-shadow: 0 0 10px rgba(245,200,66,0.4); }
  .bait-slot.empty { opacity: 0.4; cursor: default; }
  .bait-slot .bs-icon { font-size: 32px; }
  .bait-slot .bs-info { flex: 1; }
  .bait-slot .bs-name { font-weight: 800; font-size: 15px; }
  .bait-slot .bs-count { font-size: 12px; color: var(--text-light); }
  .bait-slot .bs-selected { font-size: 20px; }
  #bait-close {
    margin-top: 14px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(180deg, var(--brown-light) 0%, var(--brown-mid) 100%);
    border: 2px solid var(--brown-border);
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--parchment);
    cursor: pointer;
  }

  /* ══════════════════════════════
     INVENTORY SCREEN
  ══════════════════════════════ */
  #screen-inventory {
    background: linear-gradient(180deg, #2c1a0e 0%, #1a0e05 100%);
  }
  .sub-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 2px solid var(--brown-border);
    background: linear-gradient(180deg, #3d2008 0%, #2c1608 100%);
    flex-shrink: 0;
  }
  .sub-header h2 {
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold);
    font-size: 18px;
  }
  .close-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    border: 2px solid var(--brown-border);
    color: var(--parchment);
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  #inventory-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 16px;
    overflow-y: auto;
    flex: 1;
  }
  .inv-slot {
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment2) 100%);
    border: 2.5px solid var(--brown-border);
    border-radius: 12px;
    padding: 12px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 3px 8px var(--shadow);
    position: relative;
  }
  .inv-slot.empty-slot {
    opacity: 0.35;
    border-style: dashed;
  }
  .inv-slot .slot-icon { font-size: 32px; }
  .inv-slot .slot-name { font-size: 12px; font-weight: 800; color: var(--text-mid); margin-top: 4px; text-align: center; }
  .inv-slot .slot-stack {
    position: absolute;
    top: 6px; right: 8px;
    background: var(--brown-mid);
    color: var(--gold);
    font-size: 11px;
    font-weight: 800;
    border-radius: 8px;
    padding: 1px 6px;
  }
  .inv-slot .slot-value {
    font-size: 10px;
    color: var(--text-light);
    margin-top: 2px;
  }

  #inv-summary {
    padding: 0 16px 12px;
    font-size: 13px;
    font-weight: 700;
    color: #c8a878;
    text-align: center;
    flex-shrink: 0;
  }

  /* ══════════════════════════════
     TACKLE SHOP SCREEN
  ══════════════════════════════ */
  #screen-tackle {
    background: #fff;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #screen-tackle .close-btn {
    position: absolute;
    top: 16px; right: 16px;
    border-color: #ccc;
    color: #333;
    background: #eee;
  }
  .shop-btn {
    width: 200px;
    padding: 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    border-radius: 12px;
    border: 3px solid;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 5px 0;
  }
  .shop-btn:active { transform: translateY(3px); box-shadow: 0 2px 0; }
  #btn-sellall {
    background: linear-gradient(180deg, #5aad2e 0%, #3a7d1e 100%);
    border-color: #1a4a08;
    color: white;
    box-shadow: 0 5px 0 #0d2a04;
  }
  #btn-sellall:active { box-shadow: 0 2px 0 #0d2a04; }
  #btn-market {
    background: linear-gradient(180deg, #f5c842 0%, #c49a1a 100%);
    border-color: #8a6a08;
    color: var(--brown-dark);
    box-shadow: 0 5px 0 #7a5a04;
  }
  #btn-market:active { box-shadow: 0 2px 0 #7a5a04; }
  #sell-result {
    font-size: 15px;
    font-weight: 700;
    color: var(--green-btn);
    min-height: 24px;
    text-align: center;
  }

  /* ══════════════════════════════
     SETTINGS SCREEN
  ══════════════════════════════ */
  #screen-settings {
    background: #fff;
    align-items: center;
    justify-content: center;
  }
  #screen-settings .close-btn {
    position: absolute;
    top: 16px; right: 16px;
    border-color: #ccc;
    color: #333;
    background: #eee;
  }
  #screen-settings h2 {
    font-size: 24px;
    font-weight: 800;
    color: #333;
    margin-bottom: 24px;
  }
  #btn-reset {
    padding: 18px 40px;
    background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
    border: 3px solid #8a1a10;
    border-radius: 12px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 5px 0 #6a1008;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #btn-reset:active { transform: translateY(3px); box-shadow: 0 2px 0 #6a1008; }
</style>
</head>
<body>

<!-- ══ MAIN SCREEN ══ -->
<div id="screen-main" class="screen active">

  <!-- Top Bar -->
  <div id="top-bar">
    <div id="level-badge">
      <span class="lbl">LVL</span>
      <span class="num" id="level-num">1</span>
    </div>
    <div id="xp-section">
      <div id="xp-label">
        <span>⚡ XP</span>
        <span id="xp-text">0 / 10</span>
      </div>
      <div id="xp-bar-bg">
        <div id="xp-bar-fill" style="width:0%"></div>
      </div>
    </div>
    <div id="gold-display">
      <span class="coin-icon">🪙</span>
      <span id="gold-amount">0</span>
    </div>
  </div>

  <!-- Location Sign -->
  <div id="location-sign">
    <div id="location-name">PINEWOOD POND</div>
    <div id="location-desc">📍 A peaceful pond perfect for beginners.</div>
  </div>

  <!-- Scene -->
  <div id="scene">
    <div id="scene-rod">
      <div id="scene-line"></div>
    </div>
    <div id="scene-bobber"></div>
    <div id="catch-popup"></div>
  </div>

  <!-- Dock Action Area -->
  <div id="dock-area">
    <!-- Bait Card -->
    <div class="dock-card" id="card-bait" onclick="openBait()">
      <div class="card-title">BAIT</div>
      <div class="card-icon" id="bait-icon">🪱</div>
      <div class="card-count" id="bait-count">∞</div>
    </div>

    <!-- GO FISH Button -->
    <button id="btn-gofish" onclick="goFish()">
      <span class="btn-main-text" id="gofish-text">GO FISH!</span>
      <span class="btn-sub-text">🐟</span>
      <div id="gofish-progress"></div>
    </button>

    <!-- Autofisher Card -->
    <div class="dock-card" id="card-autofisher">
      <div class="card-title">AUTOFISHER</div>
      <div class="card-icon">🎣</div>
      <div id="autofisher-toggle">OFF</div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div id="bottom-nav">
    <div class="nav-btn" id="nav-tackle" onclick="showScreen('tackle')">
      <span class="nav-icon">🏪</span>
      <span class="nav-label">Tackle Shop</span>
    </div>
    <div class="nav-btn" id="nav-inventory" onclick="showScreen('inventory')">
      <span class="nav-icon">🎒</span>
      <span class="nav-label">Inventory</span>
    </div>
    <div class="nav-btn" onclick="showScreen('settings')">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Settings</span>
    </div>
  </div>
</div>

<!-- Level Up Flash -->
<div id="levelup-flash">
  <span class="flash-text" id="flash-num"></span>
</div>

<!-- ══ BAIT OVERLAY ══ -->
<div id="screen-bait" class="screen" onclick="closeBait(event)">
  <div id="bait-panel">
    <h2>🪱 Select Bait</h2>
    <div class="bait-slots" id="bait-slots-list"></div>
    <button id="bait-close" onclick="showScreen('main')">Close</button>
  </div>
</div>

<!-- ══ INVENTORY SCREEN ══ -->
<div id="screen-inventory" class="screen">
  <div class="sub-header">
    <h2>🎒 Inventory</h2>
    <button class="close-btn" onclick="showScreen('main')">✕</button>
  </div>
  <div id="inventory-grid"></div>
  <div id="inv-summary"></div>
</div>

<!-- ══ TACKLE SHOP SCREEN ══ -->
<div id="screen-tackle" class="screen">
  <button class="close-btn" onclick="showScreen('main')">✕</button>
  <button class="shop-btn" id="btn-sellall" onclick="sellAll()">💰 Sell All</button>
  <button class="shop-btn" id="btn-market" onclick="openMarket()">🛒 Market</button>
  <div id="sell-result"></div>
</div>

<!-- ══ SETTINGS SCREEN ══ -->
<div id="screen-settings" class="screen">
  <button class="close-btn" onclick="showScreen('main')">✕</button>
  <h2>⚙️ Settings</h2>
  <button id="btn-reset" onclick="resetGame()">🔄 Reset Progress</button>
</div>

<script>
// ════════════════════════════════════════
//  FISH DEFINITIONS
//  Each fish carries its own data.
// ════════════════════════════════════════
const FISH = {
  minnow: {
    id: 'minnow',
    name: 'Minnow',
    icon: '🐟',
    xp: 1,
    value: 1,       // $ per fish — edit this to rebalance
    catchWeight: 75, // relative weight for RNG
  },
  bluegill: {
    id: 'bluegill',
    name: 'Bluegill',
    icon: '🐠',
    xp: 2,
    value: 1,
    catchWeight: 25,
  },
};

// Build weighted pool once
const FISH_POOL = [];
Object.values(FISH).forEach(f => {
  for (let i = 0; i < f.catchWeight; i++) FISH_POOL.push(f.id);
});

// ════════════════════════════════════════
//  BAIT DEFINITIONS
// ════════════════════════════════════════
const BAITS = {
  worm: {
    id: 'worm',
    name: 'Worm',
    icon: '🪱',
    infinite: true,  // starter bait, unlimited
    description: 'Basic bait. Always available.',
  },
};

// ════════════════════════════════════════
//  XP / LEVEL CONFIG
// ════════════════════════════════════════
const MAX_LEVEL = 5;
function xpForLevel(lvl) {
  // Level 1->2: 10 XP, each next 50% more
  let req = 10;
  for (let i = 1; i < lvl; i++) req = Math.round(req * 1.5);
  return req;
}

// ════════════════════════════════════════
//  INVENTORY CONFIG
// ════════════════════════════════════════
const INV_SLOTS    = 10;
const STACK_LIMIT  = 5;

// ════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════
let state = defaultState();

function defaultState() {
  return {
    gold: 0,
    xp: 0,
    level: 1,
    // inventory: array of {fishId, count} or null per slot
    inventory: Array(INV_SLOTS).fill(null),
    // bait inventory: { baitId: count } — infinite baits use -1
    baitInventory: { worm: -1 },
    activeBait: 'worm',
  };
}

// ════════════════════════════════════════
//  SAVE / LOAD
// ════════════════════════════════════════
const SAVE_KEY = 'almightyIdleFisher_v1';

function saveGame() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    // Merge carefully so new fields from updates don't break old saves
    state = Object.assign(defaultState(), saved);
    // Ensure inventory array length
    while (state.inventory.length < INV_SLOTS) state.inventory.push(null);
    state.inventory = state.inventory.slice(0, INV_SLOTS);
  } catch(e) {}
}

function resetGame() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  localStorage.removeItem(SAVE_KEY);
  state = defaultState();
  isCasting = false;
  clearInterval(castInterval);
  document.getElementById('gofish-progress').style.width = '0%';
  updateAllUI();
  showScreen('main');
}

// ════════════════════════════════════════
//  SCREEN NAVIGATION
// ════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + name);
  if (el) el.classList.add('active');

  if (name === 'inventory') renderInventoryScreen();
  if (name === 'bait')      renderBaitScreen();
  if (name === 'main')      updateAllUI();
}

function openBait() { showScreen('bait'); }
function closeBait(e) {
  if (e.target === document.getElementById('screen-bait')) showScreen('main');
}
function openMarket() {
  // Placeholder — will be fleshed out later
  alert('Market coming soon!');
}

// ════════════════════════════════════════
//  FISHING LOGIC
// ════════════════════════════════════════
const CAST_DURATION = 3000; // ms
let isCasting = false;
let castInterval = null;
let castStart = 0;

function goFish() {
  if (isCasting) return;
  if (isInventoryFull()) return;

  isCasting = true;
  castStart = Date.now();

  const btn = document.getElementById('btn-gofish');
  btn.classList.add('pressed');
  document.getElementById('gofish-text').textContent = 'FISHING...';

  // Bobber ripple
  document.getElementById('scene-bobber').classList.add('casting');
  addRipples();

  // Progress bar
  castInterval = setInterval(() => {
    const elapsed = Date.now() - castStart;
    const pct = Math.min(100, (elapsed / CAST_DURATION) * 100);
    document.getElementById('gofish-progress').style.width = pct + '%';

    if (elapsed >= CAST_DURATION) {
      clearInterval(castInterval);
      finishCast();
    }
  }, 50);
}

function finishCast() {
  const fish = rollFish();
  const added = addToInventory(fish.id);

  if (added) {
    grantXP(fish.xp);
    showCatchPopup(fish);
  }

  // Reset button
  isCasting = false;
  const btn = document.getElementById('btn-gofish');
  btn.classList.remove('pressed');
  document.getElementById('gofish-progress').style.width = '0%';
  document.getElementById('scene-bobber').classList.remove('casting');
  removeRipples();

  updateAllUI();
  saveGame();
}

function rollFish() {
  const idx = Math.floor(Math.random() * FISH_POOL.length);
  return FISH[FISH_POOL[idx]];
}

function showCatchPopup(fish) {
  const el = document.getElementById('catch-popup');
  el.textContent = `${fish.icon} ${fish.name} caught!`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Ripple elements
function addRipples() {
  const scene = document.getElementById('scene');
  for (let i = 0; i < 3; i++) {
    const r = document.createElement('div');
    r.className = 'ripple-ring';
    r.id = 'ripple-' + i;
    scene.appendChild(r);
  }
}
function removeRipples() {
  document.querySelectorAll('.ripple-ring').forEach(r => r.remove());
}

// ════════════════════════════════════════
//  INVENTORY LOGIC
// ════════════════════════════════════════
function isInventoryFull() {
  // Full means: every slot is occupied AND no existing stack has room for any fish
  // We check: can we place ANY fish? For simplicity check if general space exists.
  const hasEmptySlot = state.inventory.some(s => s === null);
  const hasPartialStack = state.inventory.some(s => s !== null && s.count < STACK_LIMIT);
  return !hasEmptySlot && !hasPartialStack;
}

function addToInventory(fishId) {
  // 1. Find existing partial stack of same fish
  const existing = state.inventory.findIndex(s => s !== null && s.fishId === fishId && s.count < STACK_LIMIT);
  if (existing !== -1) {
    state.inventory[existing].count++;
    return true;
  }
  // 2. Find empty slot
  const empty = state.inventory.findIndex(s => s === null);
  if (empty !== -1) {
    state.inventory[empty] = { fishId, count: 1 };
    return true;
  }
  // 3. No room
  return false;
}

function clearInventory() {
  state.inventory = Array(INV_SLOTS).fill(null);
}

// ════════════════════════════════════════
//  SELL LOGIC
// ════════════════════════════════════════
function sellAll() {
  let totalGold = 0;
  let totalFish = 0;
  state.inventory.forEach(slot => {
    if (slot) {
      const fish = FISH[slot.fishId];
      totalGold += fish.value * slot.count; // value lives on the fish
      totalFish += slot.count;
    }
  });
  if (totalFish === 0) {
    document.getElementById('sell-result').textContent = 'Nothing to sell!';
    return;
  }
  clearInventory();
  state.gold += totalGold;
  saveGame();
  updateAllUI();
  document.getElementById('sell-result').textContent = `Sold ${totalFish} fish for $${totalGold}!`;
  setTimeout(() => { document.getElementById('sell-result').textContent = ''; }, 3000);
}

// ════════════════════════════════════════
//  XP & LEVELING
// ════════════════════════════════════════
function grantXP(amount) {
  if (state.level >= MAX_LEVEL) return;
  state.xp += amount;
  const needed = xpForLevel(state.level);
  if (state.xp >= needed) {
    state.xp -= needed;
    state.level++;
    flashLevelUp(state.level);
    if (state.level >= MAX_LEVEL) state.xp = 0; // cap at max
  }
}

function flashLevelUp(newLevel) {
  const flash = document.getElementById('levelup-flash');
  const num   = document.getElementById('flash-num');
  num.textContent = newLevel;

  let count = 0;
  flash.style.opacity = '1';
  const interval = setInterval(() => {
    count++;
    flash.style.opacity = flash.style.opacity === '0' ? '1' : '0';
    if (count >= 6) { // 3 flashes = 6 toggles
      clearInterval(interval);
      flash.style.opacity = '0';
    }
  }, 300);
}

// ════════════════════════════════════════
//  UI UPDATES
// ════════════════════════════════════════
function updateAllUI() {
  updateTopBar();
  updateGofishBtn();
  updateBaitCard();
}

function updateTopBar() {
  document.getElementById('level-num').textContent = state.level;
  document.getElementById('gold-amount').textContent = state.gold;

  const isMaxed = state.level >= MAX_LEVEL;
  const needed  = isMaxed ? xpForLevel(MAX_LEVEL - 1) : xpForLevel(state.level);
  const xpShow  = isMaxed ? needed : state.xp;
  const pct     = isMaxed ? 100 : Math.min(100, (state.xp / needed) * 100);

  document.getElementById('xp-text').textContent = isMaxed ? 'MAX LEVEL' : `${state.xp} / ${needed}`;
  document.getElementById('xp-bar-fill').style.width = pct + '%';
}

function updateGofishBtn() {
  const btn  = document.getElementById('btn-gofish');
  const text = document.getElementById('gofish-text');
  const navInv = document.getElementById('nav-inventory');

  if (isCasting) return; // don't override during cast

  if (isInventoryFull()) {
    btn.disabled = true;
    btn.classList.add('disabled');
    text.textContent = 'INVENTORY FULL';
    navInv.classList.add('inv-alert');
  } else {
    btn.disabled = false;
    btn.classList.remove('disabled');
    text.textContent = 'GO FISH!';
    navInv.classList.remove('inv-alert');
  }
}

function updateBaitCard() {
  const bait = BAITS[state.activeBait];
  if (!bait) return;
  document.getElementById('bait-icon').textContent  = bait.icon;
  const count = state.baitInventory[state.activeBait];
  document.getElementById('bait-count').textContent = count === -1 ? '∞' : count;
}

// ════════════════════════════════════════
//  INVENTORY SCREEN RENDER
// ════════════════════════════════════════
function renderInventoryScreen() {
  const grid = document.getElementById('inventory-grid');
  grid.innerHTML = '';

  let totalFish = 0;
  let totalValue = 0;

  state.inventory.forEach((slot, i) => {
    const div = document.createElement('div');
    if (slot) {
      const fish = FISH[slot.fishId];
      totalFish  += slot.count;
      totalValue += fish.value * slot.count;
      div.className = 'inv-slot';
      div.innerHTML = `
        <span class="slot-stack">${slot.count}/${STACK_LIMIT}</span>
        <span class="slot-icon">${fish.icon}</span>
        <span class="slot-name">${fish.name}</span>
        <span class="slot-value">$${fish.value} each</span>
      `;
    } else {
      div.className = 'inv-slot empty-slot';
      div.innerHTML = `<span class="slot-icon" style="font-size:22px;opacity:0.3">🪣</span>`;
    }
    grid.appendChild(div);
  });

  document.getElementById('inv-summary').textContent =
    totalFish > 0 ? `${totalFish} fish · Est. value $${totalValue}` : 'No fish yet — go cast a line!';
}

// ════════════════════════════════════════
//  BAIT SCREEN RENDER
// ════════════════════════════════════════
function renderBaitScreen() {
  const list = document.getElementById('bait-slots-list');
  list.innerHTML = '';

  // 5 bait slots
  const baitIds = Object.keys(state.baitInventory);
  for (let i = 0; i < 5; i++) {
    const div = document.createElement('div');
    if (i < baitIds.length) {
      const id    = baitIds[i];
      const bait  = BAITS[id];
      const count = state.baitInventory[id];
      const isSelected = state.activeBait === id;
      div.className = 'bait-slot' + (isSelected ? ' selected' : '');
      div.innerHTML = `
        <span class="bs-icon">${bait.icon}</span>
        <div class="bs-info">
          <div class="bs-name">${bait.name}</div>
          <div class="bs-count">${count === -1 ? 'Unlimited' : `x${count}`}</div>
        </div>
        ${isSelected ? '<span class="bs-selected">✅</span>' : ''}
      `;
      div.onclick = () => { state.activeBait = id; saveGame(); renderBaitScreen(); updateBaitCard(); };
    } else {
      div.className = 'bait-slot empty';
      div.innerHTML = `<span class="bs-icon">—</span><div class="bs-info"><div class="bs-name">Empty Slot</div></div>`;
    }
    list.appendChild(div);
  }
}

// ════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════
loadGame();
updateAllUI();
</script>
</body>
</html>
